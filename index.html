<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Gestione ordini settimanali materiale colazioni hotel">
  
  <title>Ordini Colazione Hotel</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥐</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%232563eb'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>🥐</text></svg>">
  
  <!-- Styles -->
  <link rel="stylesheet" href="/style.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
  
  <!-- ============================================================
       STATO CONNESSIONE
       ============================================================ -->
  <div id="connection-status" class="connection-status local">● Locale</div>
  
  <!-- ============================================================
       HEADER
       ============================================================ -->
  <header class="header">
    <div class="header-title">🥐 Ordini Colazione Hotel</div>
    <div class="header-subtitle">Checklist materiale settimanale</div>
    <div class="header-stats">
      <div class="stat">
        <span>Selezionati:</span>
        <span class="stat-value" id="selected-count">0</span>
      </div>
      <div class="stat">
        <span>Quantità tot:</span>
        <span class="stat-value" id="total-qty">0</span>
      </div>
    </div>
  </header>
  
  <!-- ============================================================
       INTESTAZIONE STAMPA (visibile solo in print)
       ============================================================ -->
  <div class="print-header">
    <h1>🥐 Ordine Colazione Hotel</h1>
    <p><!-- Data inserita dinamicamente --></p>
  </div>
  
  <!-- ============================================================
       BARRA FILTRI
       ============================================================ -->
  <div class="filters-bar">
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
      📋 Tutti
    </button>
    <button class="filter-btn" data-filter="selected" onclick="setFilter('selected')">
      ✓ Da ordinare
    </button>
    <button class="filter-btn" data-filter="Cornetti" onclick="setFilter('Cornetti')">
      🥐 Cornetti
    </button>
    <button class="filter-btn" data-filter="Bevande" onclick="setFilter('Bevande')">
      🥛 Bevande
    </button>
    <button class="filter-btn" data-filter="Yogurt" onclick="setFilter('Yogurt')">
      🥄 Yogurt
    </button>
    <button class="filter-btn" data-filter="Salumi" onclick="setFilter('Salumi')">
      🥓 Salumi
    </button>
    <button class="filter-btn" data-filter="Formaggi" onclick="setFilter('Formaggi')">
      🧀 Formaggi
    </button>
    <button class="filter-btn" data-filter="Frigo" onclick="setFilter('Frigo')">
      ❄️ Frigo
    </button>
    <button class="filter-btn" data-filter="Monouso" onclick="setFilter('Monouso')">
      🧻 Monouso
    </button>
  </div>
  
  <!-- ============================================================
       CONTENUTO PRINCIPALE
       ============================================================ -->
  <main class="main-container">
    
    <!-- Container articoli (popolato da JS) -->
    <div id="items-container">
      <div class="empty-state">
        <div class="empty-state-icon">⏳</div>
        <div class="empty-state-text">Caricamento...</div>
      </div>
    </div>
    
    <!-- Pulsante Aggiungi Extra -->
    <div class="add-extra-container">
      <button class="add-extra-btn" onclick="showAddExtraModal()">
        ➕ AGGIUNGI ARTICOLO EXTRA
      </button>
    </div>
    
  </main>
  
  <!-- ============================================================
       FOOTER STAMPA (visibile solo in print)
       ============================================================ -->
  <div class="print-footer">
    <!-- Totali inseriti dinamicamente -->
  </div>
  
  <!-- ============================================================
       TOOLBAR FISSA IN BASSO
       ============================================================ -->
  <div class="bottom-toolbar">
    <button class="toolbar-btn primary" onclick="printOrder()">
      🖨️ Stampa
    </button>
    <button class="toolbar-btn danger" onclick="confirmResetOrder()">
      🔄 Reset
    </button>
  </div>
  
  <!-- ============================================================
       SCRIPTS
       ============================================================ -->
  <script src="/firebase-config.js"></script>
  <script src="/products.js"></script>
  <script src="/app.js"></script>
  
</body>
</html>
